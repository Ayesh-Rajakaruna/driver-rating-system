server:
  port: 8080

spring:
  application:
    name: uah-driveset-migration-service

  datasource:
    url: jdbc:mysql://localhost:3306/uah_driver_set_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

migration:
  # Root folder of the extracted UAH-DriveSet dataset, e.g. containing D1, D2, D3... driver folders.
  # Can be overridden per-request in the API call body, this is just the default.
  default-dataset-path: ${DATASET_PATH:/data/UAH-DRIVESET-v1}
  batch-size: 500

logging:
  level:
    com.uahdriveset.migration: INFO

data:
  # YAML treats backslash as an escape character inside double-quoted strings, so raw
  # Windows paths like "D:\Master\..." break the parser. Use forward slashes instead -
  # Java's Path/File APIs accept them fine on Windows too - or wrap in single quotes,
  # which YAML does not escape-process (e.g. 'D:\Master\Master Project\...').
  path: "D:/Master/Master Project/DataSet/UAH-DRIVESET-v1"
